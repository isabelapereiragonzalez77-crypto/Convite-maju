<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #fdfaf6; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            font-family: 'Montserrat', sans-serif; color: #7a6b57;
        }
        .convite { 
            background: #ffffff; padding: 40px; text-align: center; 
            border: 1px solid #e0d5c1; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5em; margin-bottom: 5px; color: #6b5a45; }
        .sub { font-size: 0.9em; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        .detalhes { margin: 25px 0; font-size: 0.95em; line-height: 1.8; }
        .btn { 
            display: inline-block; background-color: #8c734b; color: #fff; 
            padding: 12px 25px; text-decoration: none; border-radius: 50px; 
            font-size: 0.9em; transition: 0.3s; margin-top: 15px;
        }
        .btn:hover { background-color: #6b5a45; }
        a { color: #8c734b; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="convite">
        <div class="sub">Convite Especial</div>
        <h1>Maju 15</h1>
        <p>Traje de banho com short</p>
        <div class="detalhes">
            04 de Outubro | 12:00<br>
            <a href="https://www.google.com/maps/search/?api=1&query=Estr.+do+Rio+Grande,+2813+Taquara+Rio+de+Janeiro+RJ" target="_blank">Ver localização</a>
        </div>
        <a href="https://wa.me/552196891017?text=Olá! Confirmo minha presença no aniversário da Maju." class="btn">Confirmar presença</a>
    </div>
</body>
</html>
