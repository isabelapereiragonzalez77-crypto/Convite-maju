<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite | Maju 15 Anos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: #fbf9f6;
            --cor-dourado: #c5a975;
            --cor-texto: #4a443d;
            --cor-branco: #ffffff;
        }

        /* Animação suave de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background-color: var(--cor-fundo);
            margin: 0;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            color: var(--cor-texto);
            display: flex;
            justify-content: center;
            animation: fadeIn 1.2s ease-out; /* Aplicando a animação */
        }

        .card {
            background: var(--cor-branco);
            width: 100%;
            max-width: 450px;
            padding: 50px 30px;
            text-align: center;
            border: 1px solid #e5e0d8;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            position: relative;
        }

        .card::after {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid var(--cor-dourado);
            pointer-events: none;
        }

        .header { text-transform: uppercase; letter-spacing: 0.4em; font-size: 0.75rem; color: var(--cor-dourado); margin-bottom: 25px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; margin: 0; color: var(--cor-texto); font-weight: 300; }
        .sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.6rem; color: var(--cor-dourado); margin-bottom: 30px; }
        .detalhes { border-top: 1px solid #efeae4; border-bottom: 1px solid #efeae4; padding: 25px 0; margin-bottom: 30px; line-height: 2; font-size: 0.95rem; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        
        .btn {
            padding: 16px 20px;
            border: 1px solid var(--cor-texto);
            color: var(--cor-texto);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.75rem;
            transition: all 0.4s ease;
        }
        
        .btn:hover { background: var(--cor-texto); color: var(--cor-branco); cursor: pointer; }
        .btn-gold { border-color: var(--cor-dourado); color: var(--cor-dourado); }
        .btn-gold:hover { background: var(--cor-dourado); color: var(--cor-branco); }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">Convite Especial</div>
        <h1>Maju</h1>
        <div class="sub">15 Anos</div>

        <div class="detalhes">
            <div><strong>04 de Outubro</strong> às <strong>12:00</strong></div>
            <div>Estr. do Rio Grande, 2813 - Taquara</div>
            <div style="margin-top: 5px;"><em>Traje: Banho com short</em></div>
        </div>

        <div class="btn-group">
            <!-- Lembre-se de substituir o link abaixo -->
            <a href="lista1.png" target="_blank" class="btn btn-gold">Ver Lista de Presentes</a>
            <a href="https://wa.me/552196891017?text=Olá! Confirmo minha presença no aniversário de 15 anos da Maju." class="btn">Confirmar Presença</a>
        </div>
    </div>
</body>
</html>
