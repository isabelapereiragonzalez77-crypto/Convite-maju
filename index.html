<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Maju 15</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: #fdfaf7;
            --cor-moldura: #c5a975;
            --cor-texto: #5a4f41;
            --cor-botao: #7a6b57;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--cor-fundo);
            font-family: 'Montserrat', sans-serif;
            color: var(--cor-texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .convite-container {
            width: 90%;
            max-width: 450px;
            padding: 40px;
            background: #ffffff;
            border: 1px solid #e8e1d5;
            position: relative;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Moldura decorativa */
        .convite-container::before {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid var(--cor-moldura);
            pointer-events: none;
        }

        .header {
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            margin-bottom: 20px;
            color: var(--cor-moldura);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            margin: 10px 0;
            font-weight: 300;
            color: var(--cor-botao);
        }

        .idade {
            font-size: 1.5rem;
            font-style: italic;
            margin-bottom: 30px;
            color: var(--cor-moldura);
        }

        .divisor {
            width: 50px;
            height: 1px;
            background: var(--cor-moldura);
            margin: 20px auto;
        }

        .info {
            font-size: 0.95rem;
            line-height: 2;
            margin-bottom: 30px;
        }

        .traje {
            font-weight: 400;
            margin-top: 10px;
        }

        .btn-container {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: transparent;
            border: 1px solid var(--cor-botao);
            color: var(--cor-botao);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--cor-botao);
            color: #ffffff;
        }

        .link-local {
            color: var(--cor-moldura);
            text-decoration: none;
            border-bottom: 1px solid var(--cor-moldura);
        }
    </style>
</head>
<body>

    <div class="convite-container">
        <div class="header">Convite Especial</div>
        <h1>Maju</h1>
        <div class="idade">15 anos</div>
        
        <div class="divisor"></div>

        <div class="info">
            <div>04 de Outubro | 12:00</div>
            <div>
                <a href="https://www.google.com/maps/search/?api=1&query=Estr.+do+Rio+Grande,+2813+Taquara+Rio+de+Janeiro+RJ" class="link-local">
                    Estr. do Rio Grande, 2813 - Taquara
                </a>
            </div>
            <div class="traje">Traje de banho com short</div>
        </div>

        <div class="btn-container">
            <a href="https://wa.me/552196891017?text=Olá! Confirmo minha presença no aniversário de 15 anos da Maju." class="btn">Confirmar Presença</a>
        </div>
    </div>

</body>
</html>
