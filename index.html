<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Maju 15</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #fdfbf7; 
        }
        img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .botoes { 
            margin-top: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            align-items: center; 
        }
        .btn { 
            padding: 15px 30px; 
            text-decoration: none; 
            color: white; 
            background-color: #c5a059; 
            border-radius: 25px; 
            font-weight: bold;
            width: 80%;
            max-width: 300px;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #a8864a; }
        .aviso { 
            color: #c5a059; 
            font-size: 15px; 
            margin-bottom: 5px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <img src="Convite.png" alt="Convite Maju 15">

    <div class="botoes">
        <!-- Aviso de prazo em dourado -->
        <p class="aviso">
            ⚠️ Favor confirmar presença até o dia 24 de setembro.
        </p>

        <!-- Botão de Localização -->
        <a href="https://www.google.com/maps/search/?api=1&query=Estr.+do+Rio+Grande,+2813+Taquara+Rio+de+Janeiro" class="btn" target="_blank">
            📍 Como chegar
        </a>

        <!-- Botão de Confirmação -->
        <a href="https://wa.me/5521968910172?text=Olá! Gostaria de confirmar minha presença no aniversário da Maju." class="btn" target="_blank">
            Confirmar Presença
        </a>
    </div>

</body>
</html>
