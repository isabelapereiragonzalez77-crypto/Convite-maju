<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite | Maju 15 Anos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fbf9f6;
            --accent: #b89665;
            --text: #4a443d;
            --white: #ffffff;
        }
        body {
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
        }
        .card {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 60px 40px;
            text-align: center;
            border: 1px solid #e5e0d8;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            position: relative;
        }
        /* Detalhe sofisticado de borda interna */
        .card::after {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid #d4c5b0;
            pointer-events: none;
        }
        .top-label {
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 25px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            margin: 0;
            color: var(--text);
            font-weight: 400;
        }
        .age {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 40px;
        }
        .details-wrapper {
            border-top: 1px solid #efeae4;
            border-bottom: 1px solid #efeae4;
            padding: 30px 0;
            margin-bottom: 40px;
        }
        .detail-item {
            margin: 15px 0;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }
        .gifts-section {
            margin-bottom: 40px;
        }
        .gifts-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--accent);
        }
        .gifts-list {
            list-style: none;
            padding: 0;
            font-size: 0.85rem;
            color: #777;
        }
        .btn {
            display: inline-block;
            padding: 18px 40px;
            border: 1px solid var(--text);
            color: var(--text);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.75rem;
            transition: all 0.4s ease;
        }
        .btn:hover {
            background: var(--text);
            color: var(--white);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="top-label">Convite Especial</div>
        <h1>Maju</h1>
        <div class="age">15 Anos</div>

        <div class="details-wrapper">
            <div class="detail-item"><strong>04 de Outubro</strong> às <strong>12:00</strong></div>
            <div class="detail-item">Estr. do Rio Grande, 2813 - Taquara</div>
            <div class="detail-item" style="margin-top: 15px;"><em>Traje: Banho com short</em></div>
        </div>

        <div class="gifts-section">
            <div class="gifts-title">Sugestão de Presente</div>
            <ul class="gifts-list">
                <li>Pix: [Sua Chave Pix Aqui]</li>
                <li>Sua presença é o nosso maior presente</li>
            </ul>
        </div>

        <a href="https://wa.me/552196891017?text=Olá! Confirmo minha presença no aniversário da Maju." class="btn">Confirmar Presença</a>
    </div>
</body>
</html>
